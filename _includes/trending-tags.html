{% assign middle_memory = site.data.middle_memory.sentences %}
{% unless middle_memory %}
  {% assign middle_memory = '' | split: '' %}
{% endunless %}

<section id="access-tags" class="middle-memory-panel">
  <h2 class="panel-heading">碎片之中</h2>
  <p id="middle-memory-text" class="middle-memory-text">正在加载中...</p>
  <script type="application/json" id="middle-memory-source">
    {{ middle_memory | jsonify }}
  </script>
</section>

<script>
  (() => {
    const target = document.getElementById('middle-memory-text');
    const source = document.getElementById('middle-memory-source');

    if (!target || !source) {
      return;
    }

    const fallback = '正在加载中...';

    const loadSentences = () => {
      try {
        const parsed = JSON.parse(source.textContent || '[]');
        return parsed
          .map((item) => String(item || '').trim())
          .filter(Boolean);
      } catch {
        return [];
      }
    };

    const renderMemory = () => {
      const sentences = loadSentences();

      if (sentences.length === 0) {
        target.textContent = fallback;
        return;
      }

      const index = Math.floor(Math.random() * sentences.length);
      target.textContent = sentences[index];
    };

    renderMemory();
  })();
</script>
