    translation: ""

  - text: |-
      Toss a coin to your Witcher
      O Valley of Plenty
      O Valley of Plenty
    translation: ""

  - text: |-
      His smile fair as spring, as towards him he draws you;
      his tongue sharp and silvery, as he implores you.
      Your wishes he grants, as he swears to adore you;
      gold, silver, jewels, he lays riches before you.
      Dues need be repaid, and he will come for you, all to reclaim;
      no smile to console you.
      He will snare you with bonds, eyes glowing afire,
      to gore and torment you till the stars expire.
      to gore and torment you till the stars expire.
    translation: ""

  - text: "そらのうえからビルがたつ。めがみえなくなってきた。"
    translation: "云层之上大厦拔地而起。我的眼睛渐渐看不见了。"

  - text: "颯爽と走るトネガワ君、今を生きてるだけ。天才とは違う、努力の賜物です。"
