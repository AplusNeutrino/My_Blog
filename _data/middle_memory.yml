sentences:
  - text: "来たれ風よ、新芽がために！"
    translation: ""

  - text: "均衡保つは白き法。"
    translation: ""

  - text: "By my guiding hand, perfected we stand."
    translation: "由我引领，我们将完美无瑕。"

  - text: "世界を、我が意のままに！ 世界よ、俺と共鳴する……"
    translation: ""

  - text: "Oh, quel ennui, quel ennui, ces gens bien gentils, qui m'aiment et me lassent, sans rien qui dépasse."
    translation: "啊，好无聊，好无聊，这些美丽的人儿，他们爱我也让我厌倦，无以复加。"

  - text: "L'heure qui passe fait le bonheur."
    translation: "流逝的时光即幸福。"

  - text: "Alea jacta est!"
    translation: "骰子已然掷下！"

  - text: "Who am I? Can I conceal myself forevermore? Pretend I'm not the man I was before? And must my name, until I die, be no more than an alibi?"
    translation: ""

  - text: "Angel of Music! Do not shun me. Come to your strange Angel..."
    translation: ""

  - text: "It's a struggle, it's a war, and there's nothing that anyone's giving. One more day standing about; what is it for?"
    translation: ""

  - text: "But remember this, my brother: see in this some higher plan. You must use this precious silver to become an honest man!"
    translation: ""

  - text: "Modesty and propriety can lead to notoriety. You could end up as the only one. Gentleness and sobriety are rare in this society. At night, a candle's brighter than the sun."
    translation: ""

  - text: "生まれた地球にいるはずなのに、何故か本当は、僕だけが違う星から来たみたいなんだ。"
    translation: ""

  - text: "I create and manipulate your kind in my image, my chosen ones. For you, the time has come; the sun is setting."
    translation: "我以自身之形创造你们，又以自身之意操弄你们。由我所拣选的生命啊——如今，你们的时辰已至；日轮西沉，终焉将临。"

  - text: "Here I rise; Claim my prize. Every moment, every sacrifice. In Anabaseios, I am the truth divine."
    translation: "我于此处登神，收取我应得的奖赏。回顾过往的所有时刻、所有牺牲，你应当明白，在这天狱之中，我即圣洁，我即真理！"

  - text: "いつか天を目掛け昇る金色の魚。龍の様に舞う。俺は迷わないぜ。もう後には退けないと、紅に誓う。"
    translation: "总有一天，金色的鱼会向着天空升腾，如龙一般飞舞。我已经不会再迷惘。向红起誓绝不会回头。"

  - text: "...アーモロートの街並みは壮麗で美しく、高い塔のさらに上、遥かな空から日差しと風が注いでいた。"
    translation: "...亚马乌罗提的风景更是美的令人起敬，高塔之上是万里的晴空，清风拂过，沁人心脾。"

  - text: "Горы, солнце, пихты, песни и дожди. И пусть полным-полно набиты мне в дорогу чемоданы: память, грусть, невозвращённые долги... А я еду, а я еду за туманом."
    translation: "群山、太阳、冷杉、歌声和雨。即使我的行囊早已被塞得满满当当，里面装着记忆、忧伤，还有那些再也无法偿还的债……而我仍在前行，我仍在前行，去追寻那片雾。"

  - text: "И снег, и ветер, и звёзд ночной полёт... Меня моё сердце в тревожную даль зовёт."
    translation: "看，风雪茫茫，夜空流星飞翔...我心向我召唤，奔向动荡的远方。"

  - text: |-
      They call this a city
