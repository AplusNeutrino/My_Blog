- id: us-states-2025
  name: 美国州界
  region: 美国
  enabled: true
  official: true
  status: active
  source_name: U.S. Census Bureau TIGERweb States layer, January 1, 2025 vintage
  source_url: https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/State_County/MapServer/0
  data_url: https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/State_County/MapServer/0/query?where=STATE%3C%3D%2756%27&outFields=NAME,STUSAB,GEOID,CENTLAT,CENTLON&returnGeometry=true&outSR=4326&geometryPrecision=2&f=geojson
  note: Uses only the 50 states and District of Columbia by FIPS state code.
- id: europe-visited-countries-2024
  name: 欧洲已访国家国界
  region: 欧洲
  enabled: true
  official: true
  status: active
  source_name: European Commission / Eurostat GISCO Countries 2024, 1:20M
  source_url: https://gisco-services.ec.europa.eu/distribution/v2/countries/
  data_url: https://gisco-services.ec.europa.eu/distribution/v2/countries/geojson/CNTR_RG_20M_2024_4326.geojson
  code_property: CNTR_ID
  include_codes:
    - UK
    - FR
    - DE
    - BE
    - LU
    - NL
    - CH
  name_property: NAME_ENGL
  name_overrides:
    UK: 英国
    FR: 法国
    DE: 德国
    BE: 比利时
    LU: 卢森堡
    NL: 荷兰
    CH: 瑞士
  note: Renders only the already visited European countries; this layer must not be used for China-related boundaries.
